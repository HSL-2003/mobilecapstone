name: ohm_lab_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # iOS-style icons
  cupertino_icons: ^1.0.8

  # Calendar package
  calendar_slider: ^0.0.4

  # HTTP client
  http: ^1.2.0
  dio: ^5.4.0

  # Google Sign In
  google_sign_in: ^6.1.0

  # Toast thông báo nhanh
  fluttertoast: ^8.2.5

  # Lưu dữ liệu local (token, user info,…)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
